<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seven-Line Supplication Companion</title>
  <style>
    :root {
      --bg: #0b0b10;
      --bg2: #11111a;
      --panel: rgba(20, 20, 30, 0.88);
      --panel-2: rgba(255,255,255,0.04);
      --text: #f5f4fb;
      --muted: #b8b5c9;
      --accent: #8f7dff;
      --accent-2: #b6abff;
      --good: #63d297;
      --warn: #f4c96b;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 22px;
      --active-line: rgba(143,125,255,0.18);
      --active-border: rgba(182,171,255,0.65);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(143,125,255,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(182,171,255,0.08), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 14px 56px;
    }

    .hero {
      text-align: center;
      padding: 20px 8px 10px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0 auto;
      max-width: 720px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .panel {
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .tab,
    button,
    select,
    input[type="file"] {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
      min-height: 48px;
    }

    select { cursor: pointer; }

    input[type="file"] {
      width: 100%;
      cursor: pointer;
      font-weight: 500;
    }

    .tab:hover, button:hover, select:hover, input[type="file"]:hover {
      border-color: rgba(143,125,255,0.55);
    }

    .tab:active, button:active {
      transform: scale(0.985);
    }

    .tab.active {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-color: transparent;
      color: white;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .primary {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-color: transparent;
      color: white;
    }

    .ghost { background: transparent; }

    .section { display: none; }
    .section.active { display: block; }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      text-align: center;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .prayer {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .line {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .line.active {
      background: var(--active-line);
      border-color: var(--active-border);
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .tib {
      font-size: clamp(21px, 3.8vw, 31px);
      line-height: 1.28;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .eng {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .hidden-line {
      color: transparent;
      background: linear-gradient(90deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
      border-radius: 10px;
      user-select: none;
    }

    .word-hidden {
      color: transparent;
      background: linear-gradient(90deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
      border-radius: 8px;
      padding: 0 0.18em;
      margin-right: 0.1em;
      user-select: none;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .counter-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-top: 14px;
    }

    .bubble {
      min-width: 120px;
      padding: 15px 20px;
      border-radius: 999px;
      text-align: center;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .session-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      padding: 16px;
      margin-top: 14px;
    }

    .recall-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      padding: 18px;
      margin-top: 14px;
    }

    .recall-prompt {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .recall-text {
      font-size: clamp(22px, 4vw, 34px);
      line-length: 1.28;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 14px;
    }

    .audio-block {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      padding: 14px;
      margin-top: 14px;
    }

    .audio-row {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
      border-radius: 12px;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.5;
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 12px;
    }

    @media (max-width: 760px) {
      .tabs, .grid-3, .audio-row { grid-template-columns: 1fr 1fr; }
      .audio-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .tabs, .grid-3 { grid-template-columns: 1fr; }
      .wrap { padding: 14px 10px 40px; }
    }
  </style>
</head>
